name = "masterai-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# Ücretsiz plan için Workers Routes
# account_id = "BURAYA_ACCOUNT_ID_YAZIN"   # wrangler login sonrası otomatik

# ── KV Namespace ──────────────────────────────────────────────────────────
# 1. Önce: wrangler kv:namespace create MASTERAI_KV
# 2. Çıkan id'yi aşağıya yazın
[[kv_namespaces]]
binding = "MASTERAI_KV"
id = "BURAYA_KV_ID_YAZIN"
preview_id = "BURAYA_KV_PREVIEW_ID_YAZIN"

# ── Opsiyonel: Cron (arka plan görevi) ───────────────────────────────────
[triggers]
crons = ["*/5 * * * *"]   # Her 5 dakikada tetikle
